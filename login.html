<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Nhập - TOOLTX2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', primary_dark: '#2563eb' } } } }</script>
    <style>
        body { background-color: #f8fafc; -webkit-user-select: none; user-select: none; }
        .input-group:focus-within .input-icon { color: #3b82f6; }
        .input-group:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-blue-100 to-transparent -z-10"></div>
    <a href="/" class="absolute top-6 left-6 w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-500 hover:text-primary active:scale-95 z-20"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>

    <main class="w-full max-w-md px-6 py-8 relative z-10 flex flex-col h-full justify-center">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-tr from-primary to-blue-700 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30 transform rotate-12">
                <i data-lucide="zap" class="w-10 h-10 text-white transform -rotate-12"></i>
            </div>
            <h1 class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-primary to-blue-800 mb-2">TOOLTX2026</h1>
            <p class="text-slate-500 font-medium">Đăng nhập để tiếp tục</p>
        </div>

        <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-slate-700 pl-1">Tên đăng nhập</label>
                <div class="input-group relative flex items-center bg-white border-2 border-slate-100 rounded-2xl transition-all duration-300">
                    <div class="pl-4 pr-3 py-3.5"><i data-lucide="user" class="w-5 h-5 text-slate-400 input-icon transition-colors"></i></div>
                    <input type="text" id="username" required class="w-full py-3.5 pr-4 bg-transparent border-none focus:outline-none text-slate-800 font-medium" placeholder="Nhập username">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-slate-700 pl-1">Mật khẩu</label>
                <div class="input-group relative flex items-center bg-white border-2 border-slate-100 rounded-2xl transition-all duration-300">
                    <div class="pl-4 pr-3 py-3.5"><i data-lucide="lock" class="w-5 h-5 text-slate-400 input-icon transition-colors"></i></div>
                    <input type="password" id="password" required class="w-full py-3.5 pr-12 bg-transparent border-none focus:outline-none text-slate-800 tracking-wide" placeholder="••••••••">
                    <button type="button" id="toggle-password" class="absolute right-0 inset-y-0 px-4 flex items-center text-slate-400 focus:outline-none"><i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i></button>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full mt-4 bg-gradient-to-r from-primary to-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-transform flex justify-center items-center relative">
                <span id="btn-text">Đăng nhập ngay</span>
                <i data-lucide="loader-2" id="btn-loader" class="w-5 h-5 animate-spin hidden absolute"></i>
            </button>
        </form>

        <div class="mt-8 text-center text-sm font-medium text-slate-600">
            Chưa có tài khoản? <a href="/register" class="text-primary font-bold hover:underline ml-1">Đăng ký</a>
        </div>
    </main>

    <!-- Custom Alert Modal -->
    <div id="alert-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeAlertModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
            <div class="w-full max-w-sm bg-white rounded-3xl p-6 pointer-events-auto shadow-2xl relative">
                <div class="text-center mb-6">
                    <div id="alert-modal-icon" class="w-12 h-12 rounded-full bg-blue-50 text-primary flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="info" class="w-6 h-6"></i>
                    </div>
                    <h3 id="alert-modal-title" class="text-lg font-bold text-slate-800 mb-2">Thông báo</h3>
                    <p id="alert-modal-message" class="text-sm text-slate-500 px-2">...</p>
                </div>
                <button onclick="closeAlertModal()" class="w-full py-3 bg-primary hover:bg-blue-600 active:scale-95 text-white font-bold rounded-2xl shadow-lg transition-all">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let alertPromiseResolver = null;
        function alert(message, type = 'info') {
            document.getElementById('alert-modal-message').innerText = message;
            const iconDiv = document.getElementById('alert-modal-icon');
            if (type === 'success' || message.includes('thành công') || message.includes('Thành công')) {
                iconDiv.className = "w-12 h-12 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center mx-auto mb-4";
                iconDiv.innerHTML = '<i data-lucide="check-circle" class="w-6 h-6"></i>';
                document.getElementById('alert-modal-title').innerText = 'Thành công';
            } else if (type === 'error' || message.includes('Lỗi') || message.includes('không') || message.includes('thất bại')) {
                iconDiv.className = "w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center mx-auto mb-4";
                iconDiv.innerHTML = '<i data-lucide="x-circle" class="w-6 h-6"></i>';
                document.getElementById('alert-modal-title').innerText = 'Lỗi';
            } else {
                iconDiv.className = "w-12 h-12 rounded-full bg-blue-50 text-primary flex items-center justify-center mx-auto mb-4";
                iconDiv.innerHTML = '<i data-lucide="info" class="w-6 h-6"></i>';
                document.getElementById('alert-modal-title').innerText = 'Thông báo';
            }
            lucide.createIcons();
            document.getElementById('alert-modal').classList.remove('hidden');
            return new Promise((resolve) => { alertPromiseResolver = resolve; });
        }
        function closeAlertModal() {
            document.getElementById('alert-modal').classList.add('hidden');
            if (alertPromiseResolver) { alertPromiseResolver(); alertPromiseResolver = null; }
        }

        document.getElementById('toggle-password').addEventListener('click', function () {
            const input = document.getElementById('password'); const icon = document.getElementById('eye-icon');
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type); icon.setAttribute('data-lucide', type === 'text' ? 'eye-off' : 'eye'); lucide.createIcons();
        });
        
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const submitBtn = document.getElementById('submit-btn');

            btnText.classList.add('opacity-0');
            btnLoader.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('role', result.role);
                    
                    setTimeout(() => {
                        if (result.role === 'admin') {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = "/account";
                        }
                    }, 500);
                } else {
                    await alert(result.message || 'Đăng nhập không thành công.');
                    document.getElementById('btn-text').classList.remove('opacity-0');
                    document.getElementById('btn-loader').classList.add('hidden');
                    document.getElementById('submit-btn').disabled = false;
                }
            } catch (error) {
                console.error(error);
                await alert('Có lỗi xảy ra trong quá trình kết nối với máy chủ.');
                document.getElementById('btn-text').classList.remove('opacity-0');
                document.getElementById('btn-loader').classList.add('hidden');
                document.getElementById('submit-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
