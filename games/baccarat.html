<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BACCARAT - TOOLTX2026</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; color: white; }

        #header-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 1000;
            background: linear-gradient(90deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; padding: 0 12px; gap: 10px;
        }

        #main-content {
            padding-top: 60px; padding-bottom: 20px;
            max-width: 800px; margin: 0 auto;
        }

        /* ── Status bar ── */
        #status-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 11px;
        }

        /* ── Grid of table cards ── */
        #tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
            padding: 12px;
        }

        .table-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer; text-decoration: none; display: block; color: white;
        }
        .table-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
        .table-card:active { transform: scale(0.98); }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .table-name {
            font-size: 13px; font-weight: 800; color: white; letter-spacing: 0.3px;
        }
        .round-badge {
            font-size: 10px; color: #64748b; font-weight: 600;
            background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 20px;
        }

        .pred-badge {
            font-size: 12px; font-weight: 900; padding: 4px 12px;
            border-radius: 20px; letter-spacing: 0.5px;
        }
        .pred-win  { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .pred-lose { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .pred-unknown { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

        .chart-wrap { padding: 8px 10px 6px; }
        canvas.chart-canvas { width: 100%; height: 90px; display: block; border-radius: 8px; }

        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px 10px;
        }

        .dots-row { display: flex; gap: 3px; flex-wrap: wrap; }
        .dot {
            width: 16px; height: 16px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 7px; font-weight: 900; color: white; flex-shrink: 0;
        }
        .dot-win  { background: #16a34a; }
        .dot-lose { background: #dc2626; }
        .dot-tie  { background: #d97706; }

        .conf-label {
            font-size: 10px; color: #f59e0b; font-weight: 800; white-space: nowrap; margin-left: 6px;
        }

        /* ── Loading / Error overlays ── */
        #overlay {
            position: fixed; inset: 0; z-index: 500;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0f172a; gap: 12px;
        }
        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f59e0b; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }


        .streak-chip {
            font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 10px;
            background: rgba(255,255,255,0.07); color: #94a3b8; white-space: nowrap;
        }

        /* ── VIP Modal ── */
        #vip-modal {
            display: none;
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        #vip-modal.show { display: flex; }
        .vip-modal-box {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 24px;
            padding: 28px 24px 20px;
            max-width: 300px; width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(245,158,11,0.12), 0 20px 60px rgba(0,0,0,0.5);
            animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn {
            from { transform: scale(0.82); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
        .vip-modal-icon {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.25);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
        }
        .vip-modal-title {
            font-size: 16px; font-weight: 900; color: #fff; margin-bottom: 8px;
        }
        .vip-modal-desc {
            font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px;
        }
        .vip-modal-btn-primary {
            display: block; width: 100%;
            background: linear-gradient(90deg, #f59e0b, #d97706);
            color: #fff; font-size: 13px; font-weight: 800;
            border: none; border-radius: 14px; padding: 12px;
            cursor: pointer; margin-bottom: 8px;
            box-shadow: 0 4px 16px rgba(245,158,11,0.3);
        }
        .vip-modal-btn-secondary {
            display: block; width: 100%;
            background: rgba(255,255,255,0.05);
            color: #64748b; font-size: 12px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 10px;
            cursor: pointer;
        }
        .vip-modal-btn-primary:active { opacity: 0.85; }
        .vip-modal-btn-secondary:active { opacity: 0.7; }
    </style>
</head>
<body>

<!-- Header -->
<div id="header-bar">
    <a href="/" style="width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;color:#94a3b8;flex-shrink:0;text-decoration:none;">
        <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
    </a>
    <img src="https://i.ibb.co/rGY7cLXY/x.jpg" alt="Baccarat"
         style="width:30px;height:30px;object-fit:cover;border-radius:8px;flex-shrink:0;">
    <div style="flex:1;min-width:0;">
        <div style="font-weight:800;font-size:14px;line-height:1.2;">BACCARAT</div>
        <div style="color:#64748b;font-size:10px;" id="header-sub">Đang tải...</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
        <div style="width:6px;height:6px;border-radius:50%;background:#10b981;" id="live-dot"></div>
        <span style="color:#10b981;font-size:10px;font-weight:700;" id="updated-at">--:--</span>
    </div>
</div>

<!-- VIP Modal -->
<div id="vip-modal">
    <div class="vip-modal-box">
        <div class="vip-modal-icon">
            <i data-lucide="crown" style="width:26px;height:26px;color:#f59e0b;"></i>
        </div>
        <div class="vip-modal-title">Yêu cầu VIP</div>
        <div class="vip-modal-desc">Bạn cần có gói VIP còn hiệu lực để xem chi tiết bàn và dự đoán.</div>
        <button class="vip-modal-btn-primary" onclick="window.location.href='/packages'">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-2px;margin-right:5px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Mua gói VIP ngay
        </button>
        <button class="vip-modal-btn-secondary" onclick="document.getElementById('vip-modal').classList.remove('show')">
            Để sau
        </button>
    </div>
</div>

<!-- Loading overlay -->
<div id="overlay">
    <div class="spinner"></div>
    <div style="color:#64748b;font-size:12px;" id="overlay-msg">Đang tải dữ liệu bàn...</div>
</div>

<!-- Main content -->
<div id="main-content" style="display:none;">
    <div id="tables-grid"></div>
</div>


<script>
lucide.createIcons();

const token = localStorage.getItem('token');
if (!token) { window.location.href = '/login'; }

// Cache trạng thái VIP
let userIsVip = false;
async function checkVipStatus() {
    try {
        const res = await fetch('/api/user.php', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (!data.success) return;
        const now = Math.floor(Date.now() / 1000);
        userIsVip = (data.vip_expire && data.vip_expire > now) || data.role === 'admin';
    } catch (e) {}
}
checkVipStatus();

// ─────────────────────────────────────────────
// PREDICTION ENGINE (results: oldest→newest)
// ─────────────────────────────────────────────
function predictBaccarat(results) {
    if (!results || results.length < 3) return { text: '?', conf: 50 };

    const R = results.slice().reverse(); // R[0] = most recent
    const N  = Math.min(R.length, 30);
    let wW = 0, wL = 0;

    function vote(res, w) { res === 'WIN' ? wW += w : wL += w; }
    function opp(r) { return r === 'WIN' ? 'LOSE' : 'WIN'; }

    // Streak
    let streak = 1;
    while (streak < N && R[streak] === R[0]) streak++;
    if (streak >= 5) vote(opp(R[0]), 4);
    else if (streak >= 3) vote(R[0], 3);
    else if (streak >= 2) vote(R[0], 2);
    else vote(R[0], 1);

    // Mean reversion (last 10)
    const last10 = R.slice(0, Math.min(10, N));
    const winRatio = last10.filter(r => r === 'WIN').length / last10.length;
    if      (winRatio >= 0.80) vote('LOSE', 3);
    else if (winRatio <= 0.20) vote('WIN',  3);
    else if (winRatio >= 0.60) vote('WIN',  1);
    else                       vote('LOSE', 1);

    // Ping-pong: A-B-A → predict B
    if (R.length >= 3 && R[0] === R[2] && R[0] !== R[1]) vote(opp(R[0]), 4);

    // Pattern 2-2: AA-BB → predict B
    if (R.length >= 4 && R[0] === R[1] && R[2] === R[3] && R[0] !== R[2]) vote(R[0], 3);

    // Markov chain
    if (R.length >= 8) {
        let pWW=0, pWL=0, pLW=0, pLL=0;
        for (let i = 0; i < Math.min(R.length-1, 20); i++) {
            if (R[i]==='WIN'  && R[i+1]==='WIN')  pWW++;
            else if (R[i]==='WIN'  && R[i+1]==='LOSE') pWL++;
            else if (R[i]==='LOSE' && R[i+1]==='WIN')  pLW++;
            else pLL++;
        }
        if (R[0] === 'WIN')  { if (pWW+pWL > 0) vote(pWW >= pWL ? 'WIN' : 'LOSE', 2); }
        else                 { if (pLW+pLL > 0) vote(pLW >= pLL ? 'WIN' : 'LOSE', 2); }
    }

    // Recent momentum (last 5)
    const last5 = R.slice(0, Math.min(5, N));
    const rec5 = last5.filter(r => r === 'WIN').length;
    if      (rec5 >= 4) vote('WIN',  2);
    else if (rec5 <= 1) vote('LOSE', 2);

    const total = wW + wL;
    const predicted = wW >= wL ? 'WIN' : 'LOSE';
    const conf = total > 0
        ? Math.round(50 + (Math.max(wW, wL) / total - 0.5) * 80)
        : 55;
    return { text: predicted, conf: Math.min(95, Math.max(52, conf)), streak };
}

// ─────────────────────────────────────────────
// CHART (canvas): results oldest→newest
// ─────────────────────────────────────────────
function drawChart(canvas, results) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const W = rect.width;
    const H = rect.height;

    // Show last 40 candles
    const maxC = 40;
    const data = results.slice(Math.max(0, results.length - maxC));
    const n = data.length;

    if (n < 1) {
        // Vẽ đường baseline ở giữa + chữ "Chưa có dữ liệu"
        const midY = H / 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(4, midY);
        ctx.lineTo(W - 4, midY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(100,116,139,0.5)';
        ctx.font = '11px ui-sans-serif, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Chưa có dữ liệu', W / 2, midY - 10);
        return;
    }

    const padT = 8, padB = 8, padL = 4, padR = 4;
    const chartH = H - padT - padB;
    const chartW = W - padL - padR;

    const step = chartW / Math.max(n, 20);

    // --- Pass 1: tính "level" nguyên cho từng nến (không dùng pixel) ---
    // WIN open ở level L, close ở L-1 (đi lên)
    // LOSE open ở level L, close ở L+1 (đi xuống)
    // TIE open = close = level nến trước
    function lastNonTie(idx) {
        for (let j = idx - 1; j >= 0; j--) {
            if (data[j] !== 'TIE') return data[j];
        }
        return null;
    }

    const openLvl  = new Array(n);
    const closeLvl = new Array(n);
    for (let i = 0; i < n; i++) {
        const r = data[i];
        if (r === 'TIE') {
            // TIE: cùng vị trí nến trước (open và close giống hệt)
            openLvl[i]  = i === 0 ? 0 : openLvl[i - 1];
            closeLvl[i] = i === 0 ? 0 : closeLvl[i - 1];
        } else {
            const isWin = r === 'WIN';
            const prev  = lastNonTie(i);
            const sameDir = prev !== null && r === prev;
            if (i === 0) {
                openLvl[i] = 0;
            } else if (sameDir) {
                // Cùng chiều: bắt đầu từ close nến trước
                openLvl[i] = closeLvl[i - 1];
            } else {
                // Đổi chiều: quay về open nến trước
                openLvl[i] = openLvl[i - 1];
            }
            closeLvl[i] = openLvl[i] + (isWin ? -1 : 1);
        }
    }

    // --- Pass 2: size = min(step, chartH/(span+2)) → vuông, vừa khít, đủ dữ liệu ---
    const allLvls = [...openLvl, ...closeLvl];
    const minLvl  = Math.min(...allLvls);
    const maxLvl  = Math.max(...allLvls);
    const span    = (maxLvl - minLvl) || 1;

    // Kích thước nến: ràng buộc bởi chiều ngang VÀ chiều dọc, lấy cái nhỏ hơn
    const sizeH = chartH / (span + 2);           // vừa khít dọc
    const sizeW = step;                           // vừa khít ngang (chạm nhau)
    const size  = Math.max(2, Math.min(sizeW, sizeH));

    const candleW = size;
    const unitH   = size;

    // Căn giữa toàn bộ dữ liệu
    const midLvl = (minLvl + maxLvl) / 2;
    function lvlY(l) {
        return padT + chartH / 2 + (l - midLvl) * unitH;
    }

    // Background grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 1; i <= 3; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    }

    // Baseline tại level 0 (điểm bắt đầu nến đầu tiên)
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(padL,   lvlY(openLvl[0]));
    ctx.lineTo(W - padR, lvlY(openLvl[0]));
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw candles — hình vuông size × size, chạm nhau từ trái sang phải
    for (let i = 0; i < n; i++) {
        const r     = data[i];
        const isTie = r === 'TIE';
        const isWin = r === 'WIN';
        const x     = padL + i * candleW;

        if (isTie) {
            const yCenter = lvlY(openLvl[i]);
            const yTop    = yCenter - candleW / 2;
            ctx.shadowColor = 'rgba(251,191,36,0.4)';
            ctx.shadowBlur  = 4;
            ctx.fillStyle   = '#fbbf24';
            ctx.fillRect(x, yTop, candleW, candleW);
            ctx.shadowBlur  = 0;
        } else {
            const yOpen  = lvlY(openLvl[i]);
            const yClose = lvlY(closeLvl[i]);
            const yTop   = Math.min(yOpen, yClose);
            ctx.shadowColor = isWin ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)';
            ctx.shadowBlur  = 4;
            ctx.fillStyle   = isWin ? '#22c55e' : '#ef4444';
            ctx.fillRect(x, yTop, candleW, candleW);
            ctx.shadowBlur  = 0;
        }
    }
}

// ─────────────────────────────────────────────
// RENDER TABLE CARD (tạo mới)
// ─────────────────────────────────────────────
function createTableCard(table) {
    const card = document.createElement('a');
    card.className = 'table-card';
    card.href = '/game/baccarat-table?table=' + encodeURIComponent(table.table_name);
    card.dataset.tableName = table.table_name;
    card.innerHTML = `
        <div class="card-header">
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="table-name">Bàn ${table.table_name}</div>
                <div class="round-badge">Phiên ${parseInt(table.round)}</div>
            </div>
        </div>
        <div class="chart-wrap">
            <canvas class="chart-canvas"></canvas>
        </div>`;
    card.addEventListener('click', function(e) {
        if (!userIsVip) {
            e.preventDefault();
            document.getElementById('vip-modal').classList.add('show');
        }
    });
    return card;
}

// Cập nhật card đã có (không tạo lại DOM)
function updateTableCard(card, table) {
    const roundBadge = card.querySelector('.round-badge');
    if (roundBadge) roundBadge.textContent = `Phiên ${parseInt(table.round)}`;

    const canvas = card.querySelector('canvas.chart-canvas');
    if (canvas) drawChart(canvas, table.results || []);
}

// ─────────────────────────────────────────────
// LOAD DATA (smart update — không flicker)
// ─────────────────────────────────────────────
async function loadData() {
    try {
        const res  = await fetch('/api/games/baccarat/history', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();

        if (!json.success) {
            showOverlayError(json.message || 'Lỗi dữ liệu.');
            return;
        }

        const tables = json.tables || [];
        const grid   = document.getElementById('tables-grid');

        // Build map of existing cards
        const existingCards = {};
        grid.querySelectorAll('.table-card[data-table-name]').forEach(c => {
            existingCards[c.dataset.tableName] = c;
        });

        // Add or update cards
        tables.forEach((table, idx) => {
            const name = table.table_name;
            if (existingCards[name]) {
                updateTableCard(existingCards[name], table);
                delete existingCards[name];
            } else {
                const card = createTableCard(table);
                grid.appendChild(card);
                requestAnimationFrame(() => {
                    const canvas = card.querySelector('canvas.chart-canvas');
                    if (canvas) drawChart(canvas, table.results || []);
                });
            }
        });

        // Remove cards no longer in data
        Object.values(existingCards).forEach(c => c.remove());

        // Update status
        document.getElementById('header-sub').textContent = `${tables.length} bàn đang hoạt động`;
        document.getElementById('updated-at').textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        // Hide overlay, show content
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';

    } catch (err) {
        showOverlayError('Không thể kết nối máy chủ.');
    }
}

function showOverlayError(msg) {
    const ov = document.getElementById('overlay');
    ov.innerHTML = `
        <i data-lucide="wifi-off" style="width:40px;height:40px;color:#ef4444;"></i>
        <div style="color:#ef4444;font-size:13px;text-align:center;max-width:260px;">${msg}</div>
        <button onclick="loadData()" style="margin-top:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:12px;font-weight:700;padding:8px 20px;border-radius:12px;cursor:pointer;">
            Thử lại
        </button>`;
    ov.style.display = 'flex';
    document.getElementById('main-content').style.display = 'none';
    lucide.createIcons();
}

// Redraw charts on resize
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
        const cards  = document.querySelectorAll('.table-card');
        const tables = Array.from(document.querySelectorAll('#tables-grid .table-card'));
        // Re-fetch to get fresh data on resize isn't needed; just redraw
        cards.forEach((card, idx) => {
            const canvas = card.querySelector('canvas.chart-canvas');
            if (canvas) {
                const dataAttr = canvas.dataset.results;
                if (dataAttr) drawChart(canvas, JSON.parse(dataAttr));
            }
        });
    }, 200);
});

// Auto refresh every 30s
loadData();
setInterval(loadData, 1000);
